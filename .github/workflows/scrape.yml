name: Daily Scrape

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run scraper
        run: node src/index.js --scrape

      - name: Commit new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "scrape: $(date -u +%Y-%m-%d)"
          git push

      - name: Send scrape report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "News Digest – scrape $(date -u +%Y-%m-%d)"
          to: ${{ secrets.EMAIL_TO }}
          from: Weekly News Digest <${{ secrets.EMAIL_USER }}>
          body: |
            Dnesni scraping probehl uspesne.

            Data jsou ulozena a pripravena pro pondeli.
            Webovy prehled: https://hornok97.github.io/Weekly-news-digest/
